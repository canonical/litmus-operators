name: litmus-infrastructure-k8s
type: charm
title: Litmus Infrastructure

assumes:
  - k8s-api
  - juju >= 3.6.0

description: |
  Litmus Infrastructure K8s is a workloadless Juju charm that registers a Juju model
  as an execution plane for LitmusChaos, an open-source chaos engineering platform for
  Kubernetes. It is an optional complement to the Canonical Observability Stack (COS):
  https://documentation.ubuntu.com/observability

  LitmusChaos enables teams to validate the resilience of their systems by running
  controlled chaos experiments (such as pod failures, network delays, or resource
  stress) and observing how the system recovers.

  This charm carries no workload of its own. When integrated with a
  litmus-backend-k8s charm (typically via a cross-model relation), it signals the
  LitmusChaos control plane to provision the execution-plane agents needed to run chaos
  experiments in the model where this charm is deployed. Removing the relation
  decommissions the infrastructure and deletes all associated experiments.

  Key features:

  - Workloadless beacon: no containers to manage, minimal resource footprint.
  - Enables cross-model chaos: deploy the control plane in one model, run experiments
    in any other model by deploying this charm there.
  - Automatic provisioning and decommissioning of execution-plane infrastructure.
  - TLS CA certificate transfer for secure communication with the control plane.

summary: |
  Workloadless beacon charm that signals Litmus ChaosCenter to provision the execution-plane infrastructure in the Juju model where it is deployed.


links:
  documentation: https://discourse.charmhub.io/t/20007
  website: https://charmhub.io/litmus-infrastructure-k8s
  source: https://github.com/canonical/litmus-operators/tree/main/infrastructure
  issues: https://github.com/canonical/litmus-operators/issues

platforms:
  ubuntu@24.04:amd64:

parts:
  charm:
    source: .
    plugin: uv
    build-packages:
      - git # handy for git+ dependencies during development
    build-snaps: [astral-uv]
    # FIXME: override-build with "git describe --always > $CRAFT_PART_INSTALL/version" causes
    # charm pack to fail "fatal: not a git repository (or any of the parent directories): .git"

    # override-build: |
    #   craftctl default
    #   git describe --always > $CRAFT_PART_INSTALL/version

requires: 
  charm-tracing:
    optional: true
    interface: tracing
    description: |
      Request a tracing endpoint through which this application will send its charm traces to a 
      tracing backend.
    limit: 1
  receive-ca-certs:
    interface: certificate_transfer
    optional: true
    description: |
      Receive CA certificates from a certificates provider charm.
provides: 
  litmus-infrastructure:
    interface: litmus-infrastructure
    description: |
      Provide the necessary metadata needed to provision a Litmus infrastructure in this Juju model.

      When the relation is removed, the provisioned infrastructure will be deleted along with any associated chaos experiments.
    optional: false