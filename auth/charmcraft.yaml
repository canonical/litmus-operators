name: litmus-auth-k8s
type: charm
title: Litmus Authentication Server

assumes:
  - k8s-api
  - juju >= 3.6.0

description: |
  Litmus Auth K8s is a Juju charm that deploys and manages the authentication and
  authorization server of LitmusChaos, an open-source chaos engineering platform for
  Kubernetes. It is an optional complement to the Canonical Observability Stack (COS):
  https://documentation.ubuntu.com/observability

  LitmusChaos enables teams to validate the resilience of their systems by running
  controlled chaos experiments (such as pod failures, network delays, or resource
  stress) and observing how the system recovers.

  The auth server handles all user authentication and authorization for the LitmusChaos
  control plane. It manages users and their associated projects, and authorizes
  incoming requests on behalf of the litmus-chaoscenter-k8s and litmus-backend-k8s
  charms. It must share a MongoDB instance with the litmus-backend-k8s charm.

  Key features:

  - User management (create, update, deactivate) and project-level access control.
  - gRPC and HTTP APIs consumed by the other Litmus control-plane charms.
  - MongoDB backend for persistent storage of users and projects.
  - TLS support for securing communications.
  - Distributed tracing for charm traces via Tempo.
  - Log forwarding to Loki for application logs.

summary: |
  Litmus Authentication Server is a component of the LitmusChaos solution, an open source platform used for chaos testing.

containers:
  auth:
    resource: litmus-auth-image
    mounts:
      - storage: certs
        location: /etc/tls

resources:
  litmus-auth-image:
    type: oci-image
    description: OCI image for Litmus authentication server 
    upstream-source: ubuntu/litmuschaos-authserver:3-24.04_edge

storage:
  certs:
    type: filesystem
    minimum-size: 1M

requires:
  database:
    optional: false
    interface: mongodb_client
    limit: 1
    description: |
      Require a MongoDB database to store essential information for 
      Litmus Chaos, including projects, and users.

      Note: This should be the same MongoDB instance used by the Litmus backend server.
  tls-certificates:
    optional: true
    interface: tls-certificates
    limit: 1
    description: |
      Receive TLS certificates.
  charm-tracing:
    optional: true
    interface: tracing
    description: |
      Request a tracing endpoint through which this application will send its charm traces to a 
      tracing backend.
    limit: 1
  logging:
    optional: true
    interface: loki_push_api
    description: |
      Request a loki-push-api endpoint to push workload container application logs to.

provides:
  litmus-auth:
    optional: false
    interface: litmus_auth
    limit: 1
    description: |
      Exchange the gRPC server endpoints of the auth and backend components.
  http-api:
    optional: false
    interface: litmus_auth_http_api
    limit: 1
    description: |
      Send this component's HTTP API to the frontend component.

links:
  documentation: https://discourse.charmhub.io/t/18789
  website: https://charmhub.io/litmus-auth-k8s
  source: https://github.com/canonical/litmus-operators/tree/main/auth
  issues: https://github.com/canonical/litmus-operators/issues

platforms:
  ubuntu@24.04:amd64:

parts:
  charm:
    source: .
    plugin: uv
    build-packages:
      - git # handy for git+ dependencies during development
      # Required by the tls_certificates_interface
      - cargo
      - libffi-dev
      - libssl-dev
      - pkg-config
      - rustc
    build-snaps: [astral-uv]
    # FIXME: override-build with "git describe --always > $CRAFT_PART_INSTALL/version" causes
    # charm pack to fail "fatal: not a git repository (or any of the parent directories): .git"

    # override-build: |
    #   craftctl default
    #   git describe --always > $CRAFT_PART_INSTALL/version
