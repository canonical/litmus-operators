name: litmus-backend-k8s
type: charm
title: Litmus Backend Server

assumes:
  - k8s-api
  - juju >= 3.6.0

description: |
  Litmus Backend K8s is a Juju charm that deploys and manages the backend API server of
  LitmusChaos, an open-source chaos engineering platform for Kubernetes. It is an
  optional complement to the Canonical Observability Stack (COS):
  https://documentation.ubuntu.com/observability

  LitmusChaos enables teams to validate the resilience of their systems by running
  controlled chaos experiments (such as pod failures, network delays, or resource
  stress) and observing how the system recovers.

  The backend server exposes a GraphQL API consumed by the litmus-chaoscenter-k8s
  charm. It manages chaos workflows, experiments, and execution-plane infrastructure.
  It must share a MongoDB instance with the litmus-auth-k8s charm.

  Key features:

  - GraphQL API for managing chaos workflows, experiments, and their results.
  - Communicates with execution-plane infrastructure registered via the
    litmus-infrastructure-k8s charm, which can be deployed in any Juju model.
  - MongoDB backend for persistent storage of workflows, experiments, and results.
  - TLS support for securing communications.
  - Distributed tracing for charm traces via Tempo.
  - Log forwarding to Loki for application logs.

summary: |
  Litmus Backend Server is a component of the LitmusChaos solution, an open source platform used for chaos testing.

containers:
  backend:
    resource: litmus-backend-image
    mounts:
      - storage: certs
        location: /etc/tls

resources:
  litmus-backend-image:
    type: oci-image
    description: OCI image for Litmus Backend server 
    upstream-source: ubuntu/litmuschaos-server:3-24.04_edge

storage:
  certs:
    type: filesystem
    minimum-size: 1M

links:
  documentation: https://discourse.charmhub.io/t/18790
  website: https://charmhub.io/litmus-backend-k8s
  source: https://github.com/canonical/litmus-operators/tree/main/backend
  issues: https://github.com/canonical/litmus-operators/issues

requires:
  database:
    optional: false
    interface: mongodb_client
    limit: 1
    description: |
      Require a MongoDB database to store essential information for Litmus Chaos,
      including chaos workflows, experiments, and the results generated from these experiments. 

      Note: This should be the same MongoDB instance used by the Litmus auth server.
  litmus-auth:
    optional: false
    interface: litmus_auth
    limit: 1
    description: |
      Exchange the gRPC server endpoints of the auth and backend components.
  tls-certificates:
    optional: true
    interface: tls-certificates
    limit: 1
    description: |
      Receive TLS certificates.
  charm-tracing:
    optional: true
    interface: tracing
    description: |
      Request a tracing endpoint through which this application will send its charm traces to a 
      tracing backend.
    limit: 1
  logging:
    optional: true
    interface: loki_push_api
    description: |
      Request a loki-push-api endpoint to push workload container application logs to.

provides:
  http-api:
    optional: false
    interface: litmus_backend_http_api
    limit: 1
    description: |
      Send this component's HTTP API to the frontend component.

platforms:
  ubuntu@24.04:amd64:

parts:
  charm:
    source: .
    plugin: uv
    build-packages:
      - git # handy for git+ dependencies during development
      # Required by the tls_certificates_interface
      - cargo
      - libffi-dev
      - libssl-dev
      - pkg-config
      - rustc
    build-snaps: [astral-uv]
    # FIXME: override-build with "git describe --always > $CRAFT_PART_INSTALL/version" causes
    # charm pack to fail "fatal: not a git repository (or any of the parent directories): .git"

    # override-build: |
    #   craftctl default
    #   git describe --always > $CRAFT_PART_INSTALL/version
