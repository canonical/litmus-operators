name: Debug Integration (SSH)

on:
  pull_request:
  workflow_dispatch:
    inputs:
      charm-path:
        description: "Charm to set up the environment for"
        required: true
        type: choice
        options:
          - auth
          - backend
          - chaoscenter
          - infrastructure
      juju-channel:
        description: "Juju snap channel"
        required: false
        type: string
        default: "3.6/candidate"
      charmcraft-channel:
        description: "Charmcraft snap channel"
        required: false
        type: string
        default: "3.x/candidate"
      tmate-timeout:
        description: "SSH session timeout (minutes)"
        required: false
        type: number
        default: 60

jobs:
  debug:
    name: Debug (${{ matrix.charm-path }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        charm-path: ${{ github.event_name == 'pull_request' && fromJSON('["auth","backend","chaoscenter","infrastructure"]') || fromJSON(format('["{0}"]', inputs.charm-path)) }}
    env:
      JUJU_CHANNEL: ${{ inputs.juju-channel || '3.6/candidate' }}
      CHARMCRAFT_CHANNEL: ${{ inputs.charmcraft-channel || '3.x/candidate' }}
      TMATE_TIMEOUT: ${{ inputs.tmate-timeout || 60 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean worker caches
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /opt/microsoft /opt/google
          sudo rm -rf /opt/az
          sudo rm -rf /usr/local/.ghcup
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Set up charm environment with concierge
        run: |
          sudo snap install concierge --classic
          cat > concierge.yaml << 'EOF'
          juju:
            channel: ${{ env.JUJU_CHANNEL }}
            model-defaults:
              test-mode: "true"
              automatically-retry-hooks: "true"
            extra-bootstrap-args: --config agent-stream=proposed
          providers:
            lxd:
              enable: true
            k8s:
              enable: true
              bootstrap: true
              bootstrap-constraints:
                root-disk: "2G"
              features:
                load-balancer:
                  l2-mode: "true"
                  cidrs: "10.43.45.0/28"
                local-storage: {}
                network: {}
          host:
            packages:
              - gnome-keyring
              - python3-pip
              - python3-venv
            snaps:
              charmcraft:
                channel: ${{ env.CHARMCRAFT_CHANNEL }}
              jq:
              yq:
              rockcraft:
              astral-uv:
              terraform:
          EOF
          sudo concierge prepare -c concierge.yaml

      - name: Pack charm
        run: |
          cd "${{ matrix.charm-path }}"
          charmcraft pack -v

      - name: Prepare environment variables
        run: |
          cd "${{ matrix.charm-path }}"
          charm_relative_path="$(find . -maxdepth 1 -name '*.charm' | sort | tail -n1)"
          CHARM_PATH="$(realpath "$charm_relative_path")"
          echo "CHARM_PATH=$CHARM_PATH" >> "$GITHUB_ENV"
          echo "Charm packed at: $CHARM_PATH"

      - name: Open SSH session (tmate)
        uses: mxschmitt/action-tmate@v3
        with:
          timeout-minutes: ${{ fromJSON(env.TMATE_TIMEOUT) }}
          limit-access-to-actor: true
